name: Summon the Hydra of Merge

on:
  pull_request_target:
    branches: [olympgit]
    types: [opened, synchronize]

jobs:
  spawn-head:
    if: github.actor != 'Hydra of Lerna[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: oracle
        with:
          app-id: ${{ vars.HYDRA_APP_ID }}
          private-key: ${{ secrets.HYDRA_APP_KEY }}

      - name: Hail OlympGit! — checkout the arena
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ steps.oracle.outputs.token }}
          persist-credentials: true

      - name: Fetch olympgit
        run: git fetch origin olympgit:olympgit

      - name: Consult the Prophecy Scroll
        id: prophecy
        run: |
          required=$(( ( ${{ github.event.pull_request.number }} % 3 ) + 2 ))
          echo "required=$required" >> "$GITHUB_OUTPUT"
          echo "The gods demand $required head(s) for this quest."

      - name: Tally heads for this quest
        id: tally
        run: |
          pr=${{ github.event.pull_request.number }}
          present=$(grep -c "🐉 Hydra Head #${pr}" olympgit:HALL_OF_GITFAME.md || true)
          echo "present=$present" >>"$GITHUB_OUTPUT"

      - name: The Hydra sprouts another head! 🐉
        if: ${{ steps.tally.outputs.present < steps.prophecy.outputs.need }}
        run: |
          pr=${{ github.event.pull_request.number }}
          head="- 🐉 Hydra Head #${pr} $(date +%s)"
          sed -i "3i\\${head}" HALL_OF_GITFAME.md

      - name: Commit the Hydra’s challenge
        run: |
          git config user.name  "Hydra of Lerna"
          git config user.email "hydra@github.com"
          git diff --quiet || {
            git commit -am "chore(hydra): grows another head"
            git push origin olympgit
          }

      - name: Hydra’s battle-cry
        if: ${{ steps.tally.outputs.present < steps.prophecy.outputs.required }}
        uses: mshick/add-pr-comment@v2
        with:
          repo-token: ${{ steps.oracle.outputs.token }}
          message: |
            > ⚔️ **The Hydra of Lerna has sprouted a fresh head!**
            >
            > Brave hero, resolve the conflict, commit, and push again.
            > Only when **all heads lie in the dust** shall Heracles let you merge.