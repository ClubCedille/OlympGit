name: Summon the Hydra of Merge

on:
  pull_request_target:
    branches: [olympgit]
    types: [opened, synchronize]

jobs:
  spawn-head:
    if: github.actor != 'Hydra of Lerna[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: oracle
        with:
          app-id: ${{ vars.HYDRA_APP_ID }}
          private-key: ${{ secrets.HYDRA_APP_KEY }}

      - name: Hail OlympGit! — checkout the arena
        uses: actions/checkout@v4
        with:
          ref: olympgit
          token: ${{ steps.oracle.outputs.token }}
          persist-credentials: true

      - name: Consult the Prophecy Scroll
        id: prophecy
        run: |
          required=$(( ( ${{ github.event.pull_request.number }} % 3 ) + 2 ))
          echo "required=$required" >> "$GITHUB_OUTPUT"
          echo "The gods demand $required head(s) for this quest."

      - name: Tally of Slain and Living Heads
        id: tally
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          cd "$GITHUB_WORKSPACE"
          pattern="^[-] 🐉 Hydra Head #${PR}"
          present=$(grep -c "$pattern" -- 'HALL_OF_GITFAME.md' || true)
          echo "present=$present" >> "$GITHUB_OUTPUT"
          echo "Hydra currently has $present head(s) for PR #${PR}."


      - name: The Hydra sprouts another head! 🐉
        if: ${{ steps.tally.outputs.present < steps.prophecy.outputs.required }}
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          new_head="- 🐉 Hydra Head #${PR} $(date +%s)"
          sed -i "3i\\${new_head}" HALL_OF_GITFAME.md
          echo "Head spawned for PR #${PR}"


      - name: Commit the Hydra’s challenge
        run: |
          git config user.name  "Hydra of Lerna"
          git config user.email "hydra@github.com"
          git diff --quiet || {
            git commit -am "chore(hydra): grows another head"
            git push origin olympgit
          }

      - name: Compute counters
        id: counters
        if: ${{ steps.tally.outputs.present < steps.prophecy.outputs.required }}
        shell: bash
        env:
          PRESENT:  ${{ steps.tally.outputs.present }}
          REQUIRED: ${{ steps.prophecy.outputs.required }}
        run: |
          after=$(( PRESENT + 1 ))
          remaining=$(( REQUIRED - after ))
          echo "after=$after"       >> "$GITHUB_OUTPUT"
          echo "remaining=$remaining" >> "$GITHUB_OUTPUT"

      - name: Hydra’s battle-cry
        if: ${{ steps.tally.outputs.present < steps.prophecy.outputs.required }}
        uses: mshick/add-pr-comment@v2
        with:
          repo-token: ${{ steps.oracle.outputs.token }}
          message-id: hydra-quest-${{ github.event.pull_request.number }}
          message: |
            > ⚔️ **The Hydra of Lerna has sprouted a fresh head!**
            >
            > 🐉 Heads standing: **${{ steps.counters.outputs.after }} / ${{ steps.prophecy.outputs.required }}**  
            > 💀 Heads remaining: **${{ steps.counters.outputs.remaining }}**
            >
            > Brave hero, resolve the conflict, commit, and push again.<br>
            > Heracles will not let you merge until **all heads lie in the dust**.

      - name: Hydra defeated
        if: ${{ steps.tally.outputs.present >= steps.prophecy.outputs.required }}
        uses: mshick/add-pr-comment@v2
        with:
          repo-token: ${{ steps.oracle.outputs.token }}
          message-id: hydra-quest-${{ github.event.pull_request.number }}
          message: |
            > 🏆 **The Hydra is slain!**  
            > All heads for this quest lie in the dust.  
            > Merge and claim your place in the Hall of GitFame. 🎉